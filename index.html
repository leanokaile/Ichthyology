<!DOCTYPE html>
<html>
<head>
  <title>Lab Acts Mock Exams</title>
  <style>
    body { font-family: Arial; background:#f4f4f4; text-align:center; }
    header { background:#2c3e50; color:white; padding:20px; font-size:22px; }
    .menu button {
      display:block; width:220px; margin:10px auto; padding:12px;
    }
    .card {
      background:white; padding:20px; margin:20px auto;
      width:80%; max-width:700px; border-radius:10px;
    }
    .option {
      margin:10px; padding:10px; background:#eee;
      cursor:pointer; border-radius:5px;
    }
    .correct{background:#a8f0a8!important;}
    .wrong{background:#f7a8a8!important;}
    .hidden{display:none;}
  </style>
</head>

<body>

<header>Lab Acts Mock Exam System</header>

<div id="home" class="menu">
  <button onclick="startLab('lab1')">Lab Act 1</button>
  <button onclick="startLab('lab2')">Lab Act 2</button>
  <button onclick="startLab('lab3')">Lab Act 3</button>
  <button onclick="startLab('lab4')">Lab Act 4</button>
</div>

<div id="quiz" class="card hidden">
  <h3 id="progress"></h3>
  <p id="question"></p>
  <div id="options"></div>
  <p id="feedback"></p>
  <button id="nextBtn" onclick="nextQuestion()" class="hidden">Next</button>
</div>

<div id="result" class="card hidden">
  <h2>Exam Finished!</h2>
  <p id="score"></p>
  <button onclick="location.reload()">Back</button>
</div>

<script>
let current=0, score=0, questions=[];

const labs = {

/* ================= LAB 1 ================= */
lab1:{
easy:[

/* MCQ */
{type:"mcq",q:"What does fish growth primarily indicate?",options:["Migration","Development and health","Color","Feeding"],a:1},
{type:"mcq",q:"Environmental factor?",options:["Age","Size","Temperature","Maturity"],a:2},
{type:"mcq",q:"Easiest to measure?",options:["Weight","Length","Volume","Density"],a:1},
{type:"mcq",q:"LWR formula?",options:["W=a+bL","W=aL²","W=aL^b","W=L/a"],a:2},
{type:"mcq",q:"Parameter b?",options:["Color","Growth pattern","Age","Temp"],a:1},
{type:"mcq",q:"Condition factor?",options:["Age","Health","Habitat","Migration"],a:1},
{type:"mcq",q:"b=3?",options:["Allometric","Isometric","Linear","Random"],a:1},
{type:"mcq",q:"LWR?",options:["Linear","Constant","Nonlinear","Cyclic"],a:2},
{type:"mcq",q:"Heteroscedasticity?",options:["Equal","Increasing variance","None","Constant"],a:1},
{type:"mcq",q:"Log makes?",options:["Curved","Random","Linear","None"],a:2},

/* TF */
{type:"tf",q:"Growth increases length and weight.",a:true},
{type:"tf",q:"Oxygen has no effect.",a:false},
{type:"tf",q:"LWR estimates biomass.",a:true},
{type:"tf",q:"Weight more stable.",a:false},
{type:"tf",q:"a relates to heaviness.",a:true},
{type:"tf",q:"Shape always same.",a:false},
{type:"tf",q:"b≈3 from volume.",a:true},
{type:"tf",q:"Large fish vary more.",a:true},
{type:"tf",q:"Log creates heteroscedasticity.",a:false},
{type:"tf",q:"Useful in fisheries.",a:true},

/* ID */
{type:"id",q:"Fish health indicator",a:"condition factor"},
{type:"id",q:"Length-weight math relation",a:"length-weight relationship"},
{type:"id",q:"Shape parameter",a:"b"},
{type:"id",q:"Scaling parameter",a:"a"},
{type:"id",q:"b=3 growth",a:"isometric growth"},
{type:"id",q:"b≠3 growth",a:"allometric growth"},
{type:"id",q:"Variance increases",a:"heteroscedasticity"},
{type:"id",q:"Equal variance",a:"homoscedasticity"},
{type:"id",q:"Curved relation",a:"nonlinear relationship"},
{type:"id",q:"Linearizing process",a:"log transformation"}

],

difficult:[

/* MCQ */
{type:"mcq",q:"Why length preferred?",options:["Visual","More stable","Less important","No tools"],a:1},
{type:"mcq",q:"Heteroscedasticity?",options:["Equal","Large fish vary more","Small vary","None"],a:1},
{type:"mcq",q:"b=3 because?",options:["Linear","Area","Volume³","Equal"],a:2},
{type:"mcq",q:"Transformation?",options:["Square","Log","Divide","Invert"],a:1},
{type:"mcq",q:"Variance after log?",options:["Increase","Decrease","Uniform","Random"],a:2},
{type:"mcq",q:"a is?",options:["Rate","Scaling","Shape","Error"],a:1},
{type:"mcq",q:"b≠3?",options:["Iso","Allo","Linear","Static"],a:1},
{type:"mcq",q:"Purpose log?",options:["Increase","Visual","Regression","Delete"],a:2},
{type:"mcq",q:"Raw data?",options:["Linear","Curved","Constant","Random"],a:1},
{type:"mcq",q:"Weight variation?",options:["Eye","Feeding","Fin","Scale"],a:1},

/* TF */
{type:"tf",q:"Biomass from LWR.",a:true},
{type:"tf",q:"b defines growth.",a:true},
{type:"tf",q:"All fish same LWR.",a:false},
{type:"tf",q:"Geography affects.",a:true},
{type:"tf",q:"Reproduction irrelevant.",a:false},
{type:"tf",q:"Small vary more.",a:false},
{type:"tf",q:"Log gives straight line.",a:true},
{type:"tf",q:"Homoscedasticity equal.",a:true},
{type:"tf",q:"LWR irrelevant.",a:false},
{type:"tf",q:"Season affects.",a:true},

/* ID */
{type:"id",q:"Fish health measure",a:"condition factor"},
{type:"id",q:"Variance increases",a:"heteroscedasticity"},
{type:"id",q:"Equal variance",a:"homoscedasticity"},
{type:"id",q:"Function type",a:"power function"},
{type:"id",q:"Growth exponent",a:"b"},
{type:"id",q:"Scaling coefficient",a:"a"},
{type:"id",q:"Shape changes",a:"allometric growth"},
{type:"id",q:"Shape constant",a:"isometric growth"},
{type:"id",q:"Method after log",a:"linear regression"},
{type:"id",q:"Curved raw data",a:"nonlinear relationship"}

]
},

/* ================= LAB 2 ================= */
lab2:{
easy:[
{type:"mcq",q:"Function of snout?",options:["Swim","Sense & feed","Waste","Breathing"],a:1},
{type:"tf",q:"Cheek protects head.",a:true},
{type:"id",q:"Gill cover",a:"operculum"}
],
difficult:[
{type:"mcq",q:"Branchiostegals?",options:["Feed","Support gills","Swim","Vision"],a:1},
{type:"tf",q:"Nape near tail.",a:false},
{type:"id",q:"Crescent tail",a:"lunate caudal fin"}
]
},

lab3:{easy:[],difficult:[]},
lab4:{easy:[],difficult:[]}
};

/* ========= ENGINE ========= */

function startLab(lab){
  current=0; score=0;
  questions=[...labs[lab].easy,...labs[lab].difficult];

  document.getElementById("home").classList.add("hidden");
  document.getElementById("quiz").classList.remove("hidden");

  showQuestion();
}

function showQuestion(){
  document.getElementById("feedback").innerText="";
  document.getElementById("nextBtn").classList.add("hidden");

  if(current>=questions.length) return showResult();

  let q=questions[current];
  document.getElementById("progress").innerText=
  `Question ${current+1}/${questions.length}`;
  document.getElementById("question").innerText=q.q;

  let opt=document.getElementById("options");
  opt.innerHTML="";

  if(q.type==="mcq"){
    q.options.forEach((o,i)=>{
      let b=document.createElement("div");
      b.className="option";
      b.innerText=o;
      b.onclick=()=>checkMCQ(i,q.a,b);
      opt.appendChild(b);
    });
  }

  else if(q.type==="tf"){
    ["True","False"].forEach(v=>{
      let b=document.createElement("div");
      b.className="option";
      b.innerText=v;
      b.onclick=()=>checkTF(v==="True",q.a,b);
      opt.appendChild(b);
    });
  }

  else if(q.type==="id"){
    let input=document.createElement("input");
    input.placeholder="Type answer + Enter";
    input.onkeydown=e=>{
      if(e.key==="Enter") checkID(input.value,q.a);
    };
    opt.appendChild(input);
  }
}

function checkMCQ(i,c,b){
  let opts=document.querySelectorAll(".option");
  opts.forEach(o=>o.onclick=null);

  if(i===c){b.classList.add("correct");score++;feedback("Correct!");}
  else{b.classList.add("wrong");opts[c].classList.add("correct");feedback("Wrong!");}
}

function checkTF(a,c,b){
  let opts=document.querySelectorAll(".option");
  opts.forEach(o=>o.onclick=null);

  if(a===c){b.classList.add("correct");score++;feedback("Correct!");}
  else{b.classList.add("wrong");feedback("Wrong!");}
}

function checkID(a,c){
  if(a.trim().toLowerCase()===c.toLowerCase()){
    score++;feedback("Correct!");
  }else{
    feedback("Wrong! Answer: "+c);
  }
}

function feedback(msg){
  document.getElementById("feedback").innerText=msg;
  document.getElementById("nextBtn").classList.remove("hidden");
}

function nextQuestion(){current++;showQuestion();}

function showResult(){
  document.getElementById("quiz").classList.add("hidden");
  document.getElementById("result").classList.remove("hidden");
  document.getElementById("score").innerText=
  `Score: ${score}/${questions.length}`;
}
</script>

</body>
</html>
