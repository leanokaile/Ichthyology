/* ========= ENGINE ========= */

function startLab(lab){
  current=0; score=0;
  questions=[...labs[lab].easy,...labs[lab].difficult];

  document.getElementById("home").classList.add("hidden");
  document.getElementById("quiz").classList.remove("hidden");

  showQuestion();
}

function showQuestion(){
  document.getElementById("feedback").innerText="";
  document.getElementById("nextBtn").classList.add("hidden");

  if(current>=questions.length) return showResult();

  let q=questions[current];
  document.getElementById("progress").innerText=
  `Question ${current+1}/${questions.length}`;
  document.getElementById("question").innerText=q.q;

  let opt=document.getElementById("options");
  opt.innerHTML="";

  if(q.type==="mcq"){
    q.options.forEach((o,i)=>{
      let b=document.createElement("div");
      b.className="option";
      b.innerText=o;
      b.onclick=()=>checkMCQ(i,q.a,b);
      opt.appendChild(b);
    });
  }

  else if(q.type==="tf"){
    ["True","False"].forEach(v=>{
      let b=document.createElement("div");
      b.className="option";
      b.innerText=v;
      b.onclick=()=>checkTF(v==="True",q.a,b);
      opt.appendChild(b);
    });
  }

  else if(q.type==="id"){
    let input=document.createElement("input");
    input.placeholder="Type answer + Enter";
    input.onkeydown=e=>{
      if(e.key==="Enter") checkID(input.value,q.a);
    };
    opt.appendChild(input);
  }
}

function checkMCQ(i,c,b){
  let opts=document.querySelectorAll(".option");
  opts.forEach(o=>o.onclick=null);

  if(i===c){b.classList.add("correct");score++;feedback("Correct!");}
  else{b.classList.add("wrong");opts[c].classList.add("correct");feedback("Wrong!");}
}

function checkTF(a,c,b){
  let opts=document.querySelectorAll(".option");
  opts.forEach(o=>o.onclick=null);

  if(a===c){b.classList.add("correct");score++;feedback("Correct!");}
  else{b.classList.add("wrong");feedback("Wrong!");}
}

function checkID(a,c){
  if(a.trim().toLowerCase()===c.toLowerCase()){
    score++;feedback("Correct!");
  }else{
    feedback("Wrong! Answer: "+c);
  }
}

function feedback(msg){
  document.getElementById("feedback").innerText=msg;
  document.getElementById("nextBtn").classList.remove("hidden");
}

function nextQuestion(){current++;showQuestion();}

function showResult(){
  document.getElementById("quiz").classList.add("hidden");
  document.getElementById("result").classList.remove("hidden");
  document.getElementById("score").innerText=
  `Score: ${score}/${questions.length}`;
}
</script>
